<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出題中 - あん摩マッサージ指圧師 過去問</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">

    <!-- 進捗バー -->
    <div class="quiz-header">
      <div class="progress-info">
        <span class="progress-text" id="progressText">1 / 10</span>
        <span class="progress-score" id="progressScore">正解 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- 問題カード -->
    <div class="card">
      <div>
        <span class="genre-tag" id="genreTag"></span>
        <span class="exam-tag"  id="examTag"></span>
      </div>

      <div class="question-text" id="questionText"></div>

      <div class="choices-list" id="choicesList"></div>

      <!-- フィードバック -->
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="choice-explanations" id="choiceExplanations"></div>
        <div class="feedback-explanation" id="feedbackExplanation"></div>
        <div class="point-box" id="pointBox"></div>
      </div>

      <!-- 免責メッセージ -->
      <div class="ai-disclaimer" id="aiDisclaimer">
        本アプリの解説はAIが生成しており、参考程度としてください。正確な情報は教科書等でご確認ください。
      </div>

      <!-- 次へボタン -->
      <div class="next-btn-wrap" id="nextBtnWrap">
        <button class="btn btn-primary" id="nextBtn">次の問題</button>
      </div>
    </div>

    <!-- 中断ボタン -->
    <div class="mt-20">
      <button class="btn btn-secondary btn-sm" id="quitBtn">中断してトップへ</button>
    </div>

  </div>

  <script src="data/questions.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
